[rate_limits]

  [rate_limits.global]
  type = "ORDER_ACTION"
  aggregate = true
  request_limit = 50
  monitor_period = "120s"
  ban_period = "5m"
  low_water_mark = 25
  high_water_mark = 40

  [rate_limits.A]
  type = "CREATE_ORDER"
  accounts = "A.*"
  request_limit = 30
  monitor_period = "1s"
  ban_period = "5m"

  [rate_limits.market_maker]
  type = "CREATE_ORDER"
  users = [ "trader" ]
  request_limit = 20
  monitor_period = "200ms"
  ban_period = "5m"
